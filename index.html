];const LS_KEY = "gk-practice-v2";

};

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(LS_KEY));
    if (s) {
      state.history = s.history||{};
      state.wrongIds = (s.wrongIds||[]).filter(id => QUESTION_BANK.some(q => q.id === id));
      state.currentCategory = s.currentCategory||"全部";
      state.currentMode = s.currentMode||"practice";
      state.currentType = s.currentType||"all";
      const clean = {};
      for (const [id, v] of Object.entries(state.history)) {
        if (QUESTION_BANK.some(q => q.id === id)) clean[id] = v;
      }
      state.history = clean;
    }
  } catch(e) {}
}
function saveState() {
  localStorage.setItem(LS_KEY, JSON.stringify({ history: state.history, wrongIds: state.wrongIds, currentCategory: state.currentCategory, currentMode: state.currentMode, currentType: state.currentType }));
}

let currentPool = [], currentQuestion = null, answered = false;
const $ = id => document.getElementById(id);

function getCategories() {
  const cats = new Set(); QUESTION_BANK.forEach(q => cats.add(q.category));
  return ["全部", ...Array.from(cats)];
}
function getCatCounts() {
  const m = {}; QUESTION_BANK.forEach(q => { m[q.category] = (m[q.category]||0)+1; }); return m;
}
function buildPool() {
  let p = QUESTION_BANK;
  if (state.currentCategory !== "全部") p = p.filter(q => q.category === state.currentCategory);
  if (state.currentType !== "all") p = p.filter(q => q.type === state.currentType);
  if (state.currentMode === "review") p = p.filter(q => state.wrongIds.includes(q.id));
  return p;
}
function pickRandom(p) { return p.length ? p[Math.floor(Math.random()*p.length)] : null; }

function getStats() {
  const e = Object.entries(state.history); const t = e.length; const c = e.filter(([,v])=>v.correct).length;
  return { total:t, correct:c, accuracy: t>0 ? Math.round(c/t*100) : 0 };
}
function getCatStats() {
  const r = {}; getCategories().filter(c=>c!=="全部").forEach(c=>{r[c]={total:0,correct:0}});
  QUESTION_BANK.forEach(q => { const h = state.history[q.id]; if (h) { r[q.category].total++; if (h.correct) r[q.category].correct++; } });
  return r;
}

function renderCategories() {
  const cnt = getCatCounts(); const cats = getCategories();
  $("categories").innerHTML = cats.map(c => {
    const a = c === state.currentCategory ? " active":"";
    const t = c === "全部" ? QUESTION_BANK.length : (cnt[c]||0);
    const pool = c === "全部" ? QUESTION_BANK : QUESTION_BANK.filter(q=>q.category===c);
    const d = pool.filter(q=>state.history[q.id]).length;

}
function renderTypeFilter() {
  $("type-filter").querySelectorAll(".type-fbtn").forEach(b => b.classList.toggle("active", b.dataset.type === state.currentType));
}
function renderModeToggle() {
  $("mode-toggle").querySelectorAll(".mode-btn").forEach(b => b.classList.toggle("active", b.dataset.mode === state.currentMode));
}
function renderHeaderStats() {
  const s = getStats(); $("total-count").textContent = s.total; $("accuracy").textContent = s.total>0 ? s.accuracy+"%" : "--";
}
function renderStatsPanel() {
  const s = getStats(); const cs = getCatStats();
  $("stats-grid").innerHTML = `<div class="stat-item"><div class="num">${s.total}</div><div class="label">总答题</div></div><div class="stat-item"><div class="num">${s.correct}</div><div class="label">正确</div></div><div class="stat-item"><div class="num">${s.total-s.correct}</div><div class="label">错误</div></div><div class="stat-item"><div class="num">${s.accuracy}%</div><div class="label">正确率</div></div><div class="stat-item"><div class="num">${state.wrongIds.length}</div><div class="label">待复习</div></div>`;
  $("cat-stats").innerHTML = Object.entries(cs).map(([cat,st]) => {
    const pct = st.total>0 ? Math.round(st.correct/st.total*100) : 0;
    return `<div class="cat-stat-row"><span class="cat-stat-name">${cat}</span><div class="cat-stat-bar"><div class="cat-stat-fill" style="width:${pct}%"></div></div><span class="cat-stat-pct">${st.total>0?pct+"%":"-"}</span></div>`;
  }).join("");
  $("stats-panel").classList.add("visible");
}

function renderQuestion(q) {
  if (!q) {
    $("q-type").textContent = ""; $("q-type").className = "q-type"; $("q-category").textContent = "";
    $("q-index").textContent = ""; $("q-stem").textContent = state.currentMode==="review"?"错题已全部复习完毕！":"当前筛选条件下没有更多题目了";
    $("options").innerHTML = `<div class="empty"><p style="font-size:13px;color:var(--text-secondary);">试试切换筛选条件</p></div>`;
    $("explanation").className = "explanation"; $("explanation").innerHTML = "";
    $("action-bar").style.display = "none";
    currentQuestion = null; answered = false;
    return;
  }
  $("explanation").className = "explanation"; $("action-bar").style.display = "none";

  $("options").querySelectorAll(".option").forEach(opt => {
    opt.addEventListener("click", () => {
      if (answered) return;
      const idx = parseInt(opt.dataset.idx);
      if (q.type === "multi") {
        if (window._multiSelected.has(idx)) { window._multiSelected.delete(idx); opt.classList.remove("selected"); }
        else { window._multiSelected.add(idx); opt.classList.add("selected"); }
      } else {
        handleAnswer([idx]);
      }
    });
  });

  if (q.type === "multi") {
    const old = document.getElementById("multi-confirm-row"); if (old) old.remove();
    const row = document.createElement("div"); row.id = "multi-confirm-row";
    row.style.cssText = "display:flex;justify-content:flex-end;margin-top:4px;";
    row.innerHTML = '<button class="btn btn-primary btn-sm" id="multi-confirm-btn">确认答案</button>';
    $("options").appendChild(row);
    document.getElementById("multi-confirm-btn").addEventListener("click", () => {
      if (answered || window._multiSelected.size === 0) return;
      handleAnswer(Array.from(window._multiSelected).sort((a,b)=>a-b));
    });
  }
  $("question-card").classList.remove("fade-out");
}

function handleAnswer(selected) {
  answered = true; const q = currentQuestion; const labels = ["A","B","C","D","E","F"];
  const cSet = new Set(q.answer); const sSet = new Set(selected);
  let correct = q.type === "multi" ? (cSet.size === sSet.size && [...cSet].every(v=>sSet.has(v))) : (selected.length===1 && cSet.has(selected[0]));

  state.history[q.id] = { correct, timestamp: Date.now() };
  if (correct) state.wrongIds = state.wrongIds.filter(id => id !== q.id);
  else if (!state.wrongIds.includes(q.id)) state.wrongIds.push(q.id);
  saveState();

  document.querySelectorAll("#options .option").forEach((opt,i) => {
    opt.classList.add("locked");
    if (q.answer.includes(i)) sSet.has(i) ? opt.classList.add("correct-choice") : opt.classList.add("reveal-correct");
    else if (sSet.has(i)) opt.classList.add("wrong-choice");
  });

  const hint = document.getElementById("multi-hint"); if (hint) hint.remove();
  const cfm = document.getElementById("multi-confirm-row"); if (cfm) cfm.remove();

  const ansLabels = q.answer.map(i=>labels[i]).join("、");
  let html = correct ? `<strong>✅ 回答正确！</strong>` : `<strong>❌ 回答错误！</strong> 你的答案：<strong>${selected.map(i=>labels[i]).join("、")}</strong>，正确答案：<strong>${ansLabels}</strong>`;
  html += `<br>${q.explain}`;
  $("explanation").innerHTML = html; $("explanation").classList.add("visible");
  $("action-bar").style.display = "flex";
  renderHeaderStats(); renderStatsPanel();
}

function nextQuestion() {
  currentPool = buildPool();
  if (currentPool.length === 0) { currentQuestion = null; $("question-card").classList.add("fade-out"); setTimeout(()=>renderQuestion(null),200); return; }
  $("question-card").classList.add("fade-out");
  setTimeout(() => renderQuestion(pickRandom(currentPool)), 200);
}

function init() {
  loadState();
  if (!state.currentCategory) state.currentCategory = "全部";
  if (!state.currentMode) state.currentMode = "practice";
  if (!state.currentType) state.currentType = "all";
  renderCategories(); renderTypeFilter(); renderModeToggle(); renderHeaderStats(); renderStatsPanel();

  $("btn-clear-wrong").addEventListener("click", () => {
    if (confirm("确定要清空错题本吗？（答题记录保留）")) {
      state.wrongIds = []; saveState();
      renderHeaderStats(); renderStatsPanel();
      if (state.currentMode === "review") nextQuestion();
    }
  });
  $("btn-reset").addEventListener("click", () => {
    if (confirm("确定要重置所有答题记录吗？此操作不可撤销。")) {
      state.history = {}; state.wrongIds = []; saveState();
      renderCategories(); renderHeaderStats(); renderStatsPanel(); nextQuestion();
    }
  });
  $("mode-toggle").addEventListener("click", e => {
    const btn = e.target.closest(".mode-btn"); if (!btn) return;
    state.currentMode = btn.dataset.mode; saveState(); renderModeToggle(); nextQuestion();
  });
  $("type-filter").addEventListener("click", e => {
    const btn = e.target.closest(".type-fbtn"); if (!btn) return;
    state.currentType = btn.dataset.type; saveState(); renderTypeFilter(); nextQuestion();
  });
  $("btn-next").addEventListener("click", nextQuestion);
  nextQuestion();
}
document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
